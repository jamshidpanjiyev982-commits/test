[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'build ok'"

[functions]
  # esbuild bundles all JS (bcryptjs, express, serverless-http, jwt) into one file.
  # mongoose is excluded from bundling (complex + native optionals) — included as node_module.
  node_bundler = "esbuild"
  external_node_modules = ["mongoose", "express"]
  included_files = ["lib/**", "api/**", "app.js", "package.json"]

# Route all /api/* requests through the Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Pretty URL for admin page
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
