[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # zisi (default) doesn't tree-shake — safer for mongoose/bcryptjs
  node_bundler = "zisi"
  # Make sure these get packaged with the function
  included_files = ["lib/**", "api/**", "server.js", "package.json"]
  # Increase timeout for cold starts (default 10s on free, 26s max)
  # Note: this is set via the dashboard for Pro plans; free is capped at 10s

# Route all /api/* requests through the Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Pretty URL for admin page
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
