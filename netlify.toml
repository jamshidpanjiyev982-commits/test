[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm ci"

[functions]
  # zisi includes ALL node_modules in the function zip — bcryptjs, jwt, mongoose, etc.
  # npm ci (above) ensures a clean, reproducible install before zisi packages it.
  node_bundler = "zisi"
  included_files = ["lib/**", "api/**", "app.js"]

# Route all /api/* requests through the Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Pretty URL for admin page
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
